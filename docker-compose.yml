version: '3.8'

services:
  db:
    image: postgres:16
    container_name: historias_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: super_password_seguro
      POSTGRES_DB: historias_inspiran
    ports:
      - "5432:5432"
    volumes:
      - ./database/data:/var/lib/postgresql/data